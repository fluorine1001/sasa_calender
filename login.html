<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 사사 캘린더</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">SASA Calendar</div>
        <div class="auth-subtitle">일정과 과제를 한 곳에서 관리하세요</div>

        <div class="input-group">
            <label for="login-id">이메일 또는 닉네임</label>
            <input type="text" id="login-id" placeholder="example@sasa.kr 또는 닉네임">
        </div>

        <div class="input-group">
            <label for="login-pw">비밀번호</label>
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요">
        </div>

        <div class="input-group" style="display: flex; align-items: center; margin-bottom: 20px;">
            <input type="checkbox" id="keep-login" style="width: auto; margin-right: 8px; cursor: pointer;">
            <label for="keep-login" style="font-size: 13px; color: #7f8c8d; cursor: pointer; margin-bottom: 0;">로그인 상태 유지 (자동 로그아웃 끄기)</label>
        </div>

        <button id="login-btn" class="btn-primary">로그인</button>
        <button id="reset-pw-btn" class="btn-secondary">비밀번호를 잊으셨나요?</button>

        <div class="auth-links">
            아직 계정이 없으신가요? <a href="signup.html">회원가입</a>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
