<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사사 캘린더</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sections.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            margin: 0;
            background-color: #f8f9fa;
        }

        /* 설정 페이지 전용 추가 스타일 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .status-linked { background-color: #e7f3fe; color: #1a73e8; }
        .status-unlinked { background-color: #fce8e6; color: #d93025; }
        
        .setting-description {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <script type="module" src="js/auth-guard.js"></script>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">SASA Calendar</div>
            
            <div class="user-profile" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;">
                <p style="margin: 0; font-size: 14px; color: #fff;">
                    <b><span id="display-nickname">불러오는 중...</span></b>님 반가워요!
                </p>
                <button id="logout-btn" style="margin-top: 10px; width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; font-size: 12px; color: #fff;">로그아웃</button>
            </div>

            <ul>
                <li class="nav-item active" data-target="dashboard">대시보드</li>
                <li class="nav-item" data-target="calendar">캘린더</li>
                <li class="nav-item" data-target="tasks">과제/공지</li>
                <li class="nav-item" data-target="penalty">벌점 관리</li>
                <li class="nav-item" data-target="timeplan">시간 계획</li>
                <li class="nav-item" data-target="eval">과목 평가 계획</li>
                <li class="nav-item" data-target="settings">설정</li>
            </ul>
        </nav>

        <main class="content">
            <section id="dashboard" class="tab-content active">
                <h1>대시보드</h1>
                <p>환영합니다! 오늘의 일정을 확인하세요.</p>
            </section>
            
            <section id="calendar" class="tab-content"><h1>캘린더</h1></section>
            <section id="tasks" class="tab-content"><h1>과제/공지</h1></section>
            <section id="penalty" class="tab-content"><h1>벌점 관리</h1></section>
            <section id="timeplan" class="tab-content"><h1>시간 계획</h1></section>
            <section id="eval" class="tab-content"><h1>과목 평가 계획</h1></section>
            
            <section id="settings" class="tab-content">
                <h1>설정</h1>
                
                <div class="card">
                    <div class="card-header">
                        <h3>외부 서비스 연동</h3>
                    </div>
                    <div class="card-body">
                        <div id="classroom-status-container">
                            <span id="link-status" class="status-badge status-unlinked">미연동</span>
                            <h4>구글 클래스룸(Google Classroom)</h4>
                            <p id="linked-email-display" class="setting-description">
                                클래스룸의 과제 및 공지사항 데이터를 자동으로 불러오기 위해 구글 계정을 연동합니다.
                            </p>
                        </div>
                        
                        <div class="action-buttons">
                            <button id="btn-link-classroom" class="btn-primary">구글 계정 연결하기</button>
                            <button id="btn-unlink-classroom" class="btn-secondary" style="display: none; background-color: #f1f3f4; border: 1px solid #dadce0; color: #3c4043; padding: 8px 16px; border-radius: 4px; cursor: pointer;">연결 해제</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    
    <script type="module" src="js/classroom.js"></script>

    <script type="module">
        import { logoutUser } from "./js/auth-guard.js";

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                if(confirm("로그아웃 하시겠습니까?")) {
                    logoutUser();
                }
            });
        }
    </script>
</body>
</html>
