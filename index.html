<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사사 캘린더</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sections.css">

    <style>
        body {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            margin: 0;
            background-color: #f8f9fa;
        }

        /* ── 상태 뱃지 ── */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }
        .status-linked   { background: #d4edda; color: #155724; }
        .status-unlinked { background: #f8d7da; color: #721c24; }

        /* ── 클래스룸 버튼 ── */
        .cl-btn-primary {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .cl-btn-primary:hover { background: #2980b9; }

        .cl-btn-secondary {
            background: #f1f2f6;
            color: #555;
            border: 1px solid #ddd;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .cl-btn-secondary:hover { background: #e0e0e0; }

        .cl-btn-danger {
            background: #fff;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .cl-btn-danger:hover { background: #e74c3c; color: #fff; }

        .cl-btn-back {
            background: none;
            border: none;
            color: #3498db;
            font-size: 13px;
            cursor: pointer;
            padding: 0;
        }
        .cl-btn-back:hover { text-decoration: underline; }

        /* ── 모달 ── */
        #classroom-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .cl-modal-box {
            background: #fff;
            border-radius: 12px;
            width: 480px;
            max-width: 92vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .cl-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .cl-modal-header h3 { margin: 0; font-size: 16px; color: #2c3e50; }
        .cl-modal-close {
            background: none; border: none;
            font-size: 20px; cursor: pointer; color: #888; line-height: 1;
        }
        #classroom-modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }

        /* ── 모달 내부 컴포넌트 ── */
        .cl-spinner {
            width: 36px; height: 36px;
            border: 4px solid #e0e0e0;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: cl-spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes cl-spin { to { transform: rotate(360deg); } }

        .cl-list { display: flex; flex-direction: column; gap: 8px; }
        .cl-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .cl-list-item:hover { background: #f0f7ff; border-color: #3498db; }
        .cl-checkable { justify-content: flex-start; gap: 12px; }
        .cl-checkbox  { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
        .cl-item-name { font-size: 14px; font-weight: 500; color: #2c3e50; }
        .cl-arrow     { font-size: 18px; color: #aaa; }
        .cl-work-info { display: flex; flex-direction: column; gap: 3px; }
        .cl-work-title { font-size: 14px; font-weight: 500; color: #2c3e50; }
        .cl-work-due   { font-size: 12px; color: #888; }

        /* ── 설정 카드 ── */
        .settings-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 24px;
            max-width: 500px;
        }
        .settings-card h3 { margin: 0 0 6px; font-size: 16px; color: #2c3e50; }
        .settings-card p  { margin: 0 0 16px; font-size: 13px; color: #888; }
        .settings-btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <script type="module" src="js/auth-guard.js"></script>

    <!-- ★ Google Identity Services (GIS) — 클래스룸 OAuth에 필요 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">SASA Calendar</div>

            <div class="user-profile" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;">
                <p style="margin: 0; font-size: 14px; color: #fff;">
                    <b><span id="display-nickname">불러오는 중...</span></b>님 반가워요!
                </p>
                <button id="logout-btn" style="margin-top: 10px; width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; font-size: 12px; color: #fff;">로그아웃</button>
            </div>

            <ul>
                <li class="nav-item active" data-target="dashboard">대시보드</li>
                <li class="nav-item" data-target="calendar">캘린더</li>
                <li class="nav-item" data-target="tasks">과제/공지</li>
                <li class="nav-item" data-target="penalty">벌점 관리</li>
                <li class="nav-item" data-target="timeplan">시간 계획</li>
                <li class="nav-item" data-target="eval">과목 평가 계획</li>
                <li class="nav-item" data-target="settings">설정</li>
            </ul>
        </nav>

        <main class="content">
            <section id="dashboard" class="tab-content active">
                <h1>대시보드</h1>
                <p>환영합니다! 오늘의 일정을 확인하세요.</p>
            </section>

            <section id="calendar" class="tab-content"><h1>캘린더</h1></section>

            <!-- ★ 과제/공지 탭 — 클래스룸 가져오기 버튼 추가 -->
            <section id="tasks" class="tab-content">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
                    <h1 style="margin:0;">과제/공지</h1>
                    <button id="classroom-import-btn" class="cl-btn-primary">
                        📥 클래스룸에서 가져오기
                    </button>
                </div>
                <div id="tasks-list"></div>
            </section>

            <section id="penalty" class="tab-content"><h1>벌점 관리</h1></section>
            <section id="timeplan" class="tab-content"><h1>시간 계획</h1></section>
            <section id="eval" class="tab-content"><h1>과목 평가 계획</h1></section>

            <!-- ★ 설정 탭 — 클래스룸 연동 카드 추가 -->
            <section id="settings" class="tab-content">
                <h1>설정</h1>
                <div class="settings-card">
                    <h3>
                        Google 클래스룸 연동
                        <span id="link-status" class="status-badge status-unlinked">미연동</span>
                    </h3>
                    <p id="linked-email-display"></p>
                    <div class="settings-btn-row">
                        <button id="btn-link-classroom" class="cl-btn-primary">클래스룸 연동하기</button>
                        <button id="btn-unlink-classroom" class="cl-btn-danger" style="display:none;">연동 해제</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ★ 클래스룸 과제 선택 모달 -->
    <div id="classroom-modal">
        <div class="cl-modal-box">
            <div class="cl-modal-header">
                <h3>Google Classroom 과제 가져오기</h3>
                <button class="cl-modal-close" id="cl-modal-close-btn">✕</button>
            </div>
            <div id="classroom-modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>

    <script type="module">
        import { logoutUser } from "./js/auth-guard.js";
        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm("로그아웃 하시겠습니까?")) logoutUser();
        });
    </script>

    <!-- ★ classroom.js 로드 -->
    <script type="module" src="js/classroom.js"></script>
</body>
</html>
