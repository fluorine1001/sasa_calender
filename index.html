<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사사 캘린더</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/sections.css">
</head>
<body>
    <script type="module" src="js/auth-guard.js"></script>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">SASA Calendar</div>
            
            <div class="user-profile" style="padding: 15px; border-bottom: 1px solid #ddd; margin-bottom: 10px;">
                <p><b><span id="display-nickname">로딩 중...</span></b>님</p>
                <button id="logout-btn" style="margin-top: 5px; padding: 5px 10px; cursor: pointer;">로그아웃</button>
            </div>

            <ul>
                <li class="nav-item active" data-target="dashboard">대시보드</li>
                <li class="nav-item" data-target="calendar">캘린더</li>
                <li class="nav-item" data-target="tasks">과제/공지</li>
                <li class="nav-item" data-target="penalty">벌점 관리</li>
                <li class="nav-item" data-target="timeplan">시간 계획</li>
                <li class="nav-item" data-target="eval">과목 평가 계획</li>
                <li class="nav-item" data-target="settings">설정</li>
            </ul>
        </nav>

        <main class="content">
            <section id="dashboard" class="tab-content active"><h1>대시보드</h1></section>
            <section id="calendar" class="tab-content"><h1>캘린더</h1></section>
            <section id="tasks" class="tab-content"><h1>과제/공지</h1></section>
            <section id="penalty" class="tab-content"><h1>벌점 관리</h1></section>
            <section id="timeplan" class="tab-content"><h1>시간 계획</h1></section>
            <section id="eval" class="tab-content"><h1>과목 평가 계획</h1></section>
            <section id="settings" class="tab-content"><h1>설정</h1></section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/calendar.js"></script>

    <script type="module">
        import { logoutUser } from "./js/auth-guard.js";

        // localStorage에 저장된 닉네임을 가져와서 화면에 출력
        setTimeout(() => {
            const nickname = localStorage.getItem('currentUserNickname');
            if(nickname) {
                document.getElementById('display-nickname').textContent = nickname;
            }
        }, 500); // auth-guard가 데이터를 가져올 시간을 약간(0.5초) 기다림

        // 로그아웃 버튼 클릭 이벤트 연결
        document.getElementById('logout-btn').addEventListener('click', () => {
            if(confirm("정말 로그아웃 하시겠습니까?")) {
                logoutUser();
            }
        });
    </script>
</body>
</html>
