<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사사 캘린더 - 회원가입</title>
</head>
<body>
    <h2>회원가입</h2>
    <input type="email" id="signup-email" placeholder="이메일 (school@sasa.kr)"><br>
    <input type="text" id="signup-nickname" placeholder="사용할 닉네임"><br>
    <input type="password" id="signup-pw" placeholder="비밀번호 (6자리 이상)"><br>
    <input type="password" id="signup-pw-confirm" placeholder="비밀번호 확인"><br>
    <button id="signup-btn">가입하기</button>
    <p><a href="login.html">이미 계정이 있으신가요? 로그인</a></p>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
