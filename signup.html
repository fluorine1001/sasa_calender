<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 사사 캘린더</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">SASA Calendar</div>
        <div class="auth-subtitle">새로운 계정을 만들어 보세요</div>

        <div class="input-group">
            <label for="signup-email">이메일 주소</label>
            <input type="email" id="signup-email" placeholder="학교 이메일을 권장합니다">
        </div>

        <div class="input-group">
            <label for="signup-nickname">사용할 닉네임</label>
            <input type="text" id="signup-nickname" placeholder="시스템 내에서 사용할 이름">
        </div>

        <div class="input-group">
            <label for="signup-pw">비밀번호</label>
            <input type="password" id="signup-pw" placeholder="6자리 이상 입력해주세요">
        </div>

        <div class="input-group">
            <label for="signup-pw-confirm">비밀번호 확인</label>
            <input type="password" id="signup-pw-confirm" placeholder="비밀번호를 한 번 더 입력해주세요">
        </div>

        <button id="signup-btn" class="btn-primary">가입하기</button>

        <div class="auth-links">
            이미 계정이 있으신가요? <a href="login.html">로그인으로 돌아가기</a>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
