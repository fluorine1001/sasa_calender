<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클래스룸 API 테스트</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <h2>구글 클래스룸 연동 테스트</h2>
    <button id="loginBtn" onclick="handleAuthClick()">구글 계정으로 로그인 및 데이터 가져오기</button>
    <div id="result">F12를 눌러 콘솔(Console) 창을 확인하세요!</div>

    <script>
        let tokenClient;
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; // ★여기에 구글에서 받은 Client ID를 넣으세요!

        // 페이지가 로드되면 구글 로그인 설정 준비
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                // 클래스룸 수업 목록을 읽겠다는 권한 요청
                scope: 'https://www.googleapis.com/auth/classroom.courses.readonly',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        console.log("🎉 토큰 발급 성공! 토큰 값:", tokenResponse.access_token);
                        // 토큰을 성공적으로 받으면 바로 클래스룸 API 호출
                        fetchClassroomData(tokenResponse.access_token);
                    }
                },
            });
        };

        // 버튼을 누르면 실행되는 함수
        function handleAuthClick() {
            // 구글 로그인 팝업 띄우기
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        // 받아온 토큰으로 실제 클래스룸 데이터를 가져오는 함수
        async function fetchClassroomData(token) {
            console.log("데이터를 가져오는 중...");
            try {
                const response = await fetch('https://classroom.googleapis.com/v1/courses', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`, // 여기에 열쇠(토큰)를 넣어서 구글에 보냅니다
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                console.log("🚀 클래스룸 수업 데이터 가져오기 성공!");
                console.log(data); // 콘솔에 결과 출력
            } catch (error) {
                console.error("에러 발생:", error);
            }
        }
    </script>
</body>
</html>
